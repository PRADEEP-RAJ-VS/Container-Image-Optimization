name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  ECR_REPOSITORY: docker-optimizer

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (advisory)
        run: pnpm run lint
        continue-on-error: true

      - name: Type check (advisory)
        run: pnpm exec tsc --noEmit
        continue-on-error: true

      - name: Build (required)
        run: pnpm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: '1'

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: docker-optimizer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ecr:
    name: Push Image To ECR
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Precheck AWS deploy configuration
        id: precheck
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${AWS_ROLE_TO_ASSUME:-}" && -n "${AWS_REGION:-}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "${AWS_ACCESS_KEY_ID:-}" && -n "${AWS_SECRET_ACCESS_KEY:-}" && -n "${AWS_REGION:-}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "mode=keys" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "mode=none" >> "$GITHUB_OUTPUT"
          echo "AWS deploy secrets not configured; skipping ECR push."

      - name: Configure AWS credentials (OIDC)
        if: steps.precheck.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure AWS credentials (access keys)
        if: steps.precheck.outputs.mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.precheck.outputs.enabled == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        if: steps.precheck.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ecs:
    name: Deploy To ECS
    runs-on: ubuntu-latest
    needs: deploy-ecr
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Precheck AWS ECS deploy configuration
        id: precheck
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          ECS_CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
          ECS_SERVICE_NAME: ${{ secrets.ECS_SERVICE_NAME }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${ECS_CLUSTER_NAME:-}" || -z "${ECS_SERVICE_NAME:-}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "mode=none" >> "$GITHUB_OUTPUT"
            echo "ECS_CLUSTER_NAME/ECS_SERVICE_NAME not configured; skipping ECS deploy."
            exit 0
          fi

          if [[ -n "${AWS_ROLE_TO_ASSUME:-}" && -n "${AWS_REGION:-}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "${AWS_ACCESS_KEY_ID:-}" && -n "${AWS_SECRET_ACCESS_KEY:-}" && -n "${AWS_REGION:-}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "mode=keys" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "mode=none" >> "$GITHUB_OUTPUT"
          echo "AWS deploy secrets not configured; skipping ECS deploy."

      - name: Configure AWS credentials (OIDC)
        if: steps.precheck.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure AWS credentials (access keys)
        if: steps.precheck.outputs.mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.precheck.outputs.enabled == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Register new task definition revision (image update)
        if: steps.precheck.outputs.enabled == 'true'
        env:
          ECS_CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
          ECS_SERVICE_NAME: ${{ secrets.ECS_SERVICE_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "Deploying image: ${IMAGE_URI}"

          SERVICE_JSON="$(aws ecs describe-services --cluster "${ECS_CLUSTER_NAME}" --services "${ECS_SERVICE_NAME}" --region "${AWS_REGION}")"
          TASK_DEF_ARN="$(echo "${SERVICE_JSON}" | jq -r '.services[0].taskDefinition')"
          if [[ -z "${TASK_DEF_ARN}" || "${TASK_DEF_ARN}" == "null" ]]; then
            echo "Could not find current task definition for service ${ECS_SERVICE_NAME} in cluster ${ECS_CLUSTER_NAME}"
            exit 1
          fi

          TASK_DEF_JSON="$(aws ecs describe-task-definition --task-definition "${TASK_DEF_ARN}" --region "${AWS_REGION}")"

          CONTAINER_NAME="$(echo "${TASK_DEF_JSON}" | jq -r '.taskDefinition.containerDefinitions[0].name')"
          if [[ -z "${CONTAINER_NAME}" || "${CONTAINER_NAME}" == "null" ]]; then
            echo "Could not determine container name from task definition ${TASK_DEF_ARN}"
            exit 1
          fi

          NEW_TASK_DEF="$(echo "${TASK_DEF_JSON}" | jq -r --arg IMAGE "${IMAGE_URI}" --arg CN "${CONTAINER_NAME}" '
            .taskDefinition
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
            | .containerDefinitions = (
                .containerDefinitions
                | map(if .name == $CN then .image = $IMAGE else . end)
              )
          ')"

          NEW_TASK_DEF_ARN="$(
            aws ecs register-task-definition \
              --region "${AWS_REGION}" \
              --cli-input-json "${NEW_TASK_DEF}" \
            | jq -r '.taskDefinition.taskDefinitionArn'
          )"

          if [[ -z "${NEW_TASK_DEF_ARN}" || "${NEW_TASK_DEF_ARN}" == "null" ]]; then
            echo "Failed to register new task definition"
            exit 1
          fi

          echo "Registered task definition: ${NEW_TASK_DEF_ARN}"
          echo "NEW_TASK_DEF_ARN=${NEW_TASK_DEF_ARN}" >> "$GITHUB_ENV"

      - name: Update ECS service to new task definition
        if: steps.precheck.outputs.enabled == 'true'
        env:
          ECS_CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
          ECS_SERVICE_NAME: ${{ secrets.ECS_SERVICE_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        shell: bash
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --service "${{ secrets.ECS_SERVICE_NAME }}" \
            --task-definition "${NEW_TASK_DEF_ARN}" \
            --region "${{ secrets.AWS_REGION }}"
